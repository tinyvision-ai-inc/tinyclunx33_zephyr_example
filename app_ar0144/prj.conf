CONFIG_MINIMAL_LIBC=y
CONFIG_ASSERT=n
CONFIG_HEAP_MEM_POOL_SIZE=128

# USB
CONFIG_UDC_DRIVER=y
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_VIDEO_CLASS=y
CONFIG_UDC_BUF_COUNT=32
CONFIG_UDC_BUF_POOL_SIZE=2048

# VIDEO
CONFIG_VIDEO=y
CONFIG_VIDEO_BUFFER_POOL_SZ_MAX=4096
CONFIG_VIDEO_BUFFER_POOL_NUM_MAX=1

# LOG
CONFIG_LOG=y
CONFIG_LOG_MODE_MINIMAL=y
# CONFIG_UDC_DRIVER_LOG_LEVEL_WRN=y
# CONFIG_USBD_LOG_LEVEL_WRN=y
# CONFIG_USBD_VIDEO_LOG_LEVEL_DBG=y
# CONFIG_VIDEO_LOG_LEVEL_DBG=y
# CONFIG_GPIO_LOG_LEVEL_DBG=y

CONFIG_GPIO=y